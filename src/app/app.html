<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouston</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600;700&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera" />

  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <div class="titlebar">
    <img class="titlebar__logo" src="../../img/logo_blue.png" alt="" />
    <span class="titlebar__title">Bouston</span>
  </div>

  <!-- ══ VIEW: FEED ══════════════════════════ -->
  <div id="view-feed" class="view view--active">
    <div class="feed" id="feed">

      <div class="compose">
        <div class="compose__row">
          <img class="avatar" id="feed-compose-avatar" src="../../img/logo_blue.png" alt="" />
          <div class="compose__input" id="feed-compose-input" contenteditable="true" data-placeholder="Напишите что нибудь..." role="textbox"></div>
        </div>
        <div class="compose__previews" id="feed-compose-previews"></div>
        <div class="compose__footer">
          <label class="btn-photo" for="feed-photo-input" title="Добавить фото">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </label>
          <input type="file" id="feed-photo-input" accept="image/*,video/*" multiple style="display:none" />
          <button class="btn-photo btn-emoji-open" data-target="feed-compose-input" title="Добавить эмодзи">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="btn-post" id="feed-btn-post">Выставить</button>
        </div>
      </div>

      <div id="posts-container"></div>
    </div>
  </div>

  <!-- ══ VIEW: PROFILE ═══════════════════════ -->
  <div id="view-profile" class="view">

    <div class="profile-wrap" id="profile-wrap">

      <div class="profile-card" id="profile-card">
        <div class="profile-card__banner">
          <img class="profile-card__banner-img" id="banner-img" src="" alt="" />
          <div class="profile-card__banner-placeholder" id="banner-placeholder"></div>
          <button class="btn-banner-settings" id="btn-banner-settings" title="Настройки профиля">
            <img src="../../img/settings.svg" alt="settings" />
          </button>
        </div>
        <div class="profile-card__avatar-section">
          <div class="profile-card__avatar-wrap">
            <img class="profile-card__avatar" id="profile-avatar" src="../../img/logo_blue.png" alt="" />
          </div>
        </div>
        <div class="profile-card__body">
          <div class="profile-card__info">
            <div class="profile-card__namerow">
              <span class="profile-card__name" id="profile-name">Bouston</span>
              <img class="profile-card__verified" id="profile-verified-badge" src="../../img/verided.svg" alt="verified" style="display:none" />
            </div>
            <span class="profile-card__username" id="profile-username"></span>
            <span class="profile-card__bio" id="profile-bio">Web &amp; UI/UX Designer</span>
          </div>
        </div>
      </div>

      <div class="compose">
        <div class="compose__row">
          <img class="avatar" id="profile-compose-avatar" src="../../img/logo_blue.png" alt="" />
          <div class="compose__input" id="profile-compose-input" contenteditable="true" data-placeholder="Напишите что нибудь..." role="textbox"></div>
        </div>
        <div class="compose__previews" id="profile-compose-previews"></div>
        <div class="compose__footer">
          <label class="btn-photo" for="profile-photo-input" title="Добавить фото">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </label>
          <input type="file" id="profile-photo-input" accept="image/*,video/*" multiple style="display:none" />
          <button class="btn-photo btn-emoji-open" data-target="profile-compose-input" title="Добавить эмодзи">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="btn-post" id="profile-btn-post">Выставить</button>
        </div>
      </div>

      <div id="profile-posts-container"></div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="edit-modal" hidden>
      <div class="edit-modal__box">
        <div class="edit-modal__header">
          <span class="edit-modal__title">Редактировать профиль</span>
          <button class="btn-close-modal" id="btn-close-modal">
            <img src="../../img/close.svg" alt="close" />
          </button>
        </div>
        <div class="edit-modal__body">
          <div class="edit-img-row">
            <div class="edit-img-field edit-img-field--avatar">
              <button class="edit-img-btn" id="btn-pick-avatar">
                <img id="modal-avatar-preview" src="" alt="" style="display:none" />
                <div class="img-overlay"><span class="material-symbols-outlined">photo_camera</span></div>
              </button>
            </div>
            <div class="edit-img-field" style="flex:1">
              <button class="edit-img-btn" id="btn-pick-banner" style="height:70px">
                <img id="modal-banner-preview" src="" alt="" style="display:none" />
                <div class="img-overlay"><span class="material-symbols-outlined">photo_camera</span></div>
              </button>
            </div>
          </div>
          <div class="edit-field">
            <label>Имя</label>
            <input id="input-name" type="text" placeholder="Ваше имя" />
          </div>
          <div class="edit-field">
            <label>Юзернейм</label>
            <input id="input-username-profile" type="text" placeholder="@username" maxlength="21" />
          </div>
          <div class="edit-field">
            <label>Описание</label>
            <input id="input-bio" type="text" placeholder="Web &amp; UI/UX Designer" />
          </div>
        </div>
        <div class="edit-modal__footer">
          <button class="btn-save" id="btn-save">Сохранить</button>
          <button class="btn-logout" id="btn-logout">Выйти</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ══ Confirm logout ════════════════════════ -->
  <div class="confirm-overlay" id="confirm-logout-overlay" hidden>
    <div class="confirm-box">
      <span class="confirm-box__title">Выйти?</span>
      <span class="confirm-box__sub">Вы уверены, что хотите выйти из аккаунта?</span>
      <button class="confirm-box__btn confirm-box__btn--yes" id="confirm-logout-yes">Выйти</button>
      <button class="confirm-box__btn confirm-box__btn--no" id="confirm-logout-no">Отмена</button>
    </div>
  </div>

  <!-- ══ Thread panel ══════════════════════════ -->
  <div class="thread-overlay" id="thread-overlay" hidden>
    <div class="thread-wrap">
      <div class="thread-header">
        <button class="thread-panel__back" id="thread-back">
          <img src="../../img/close.svg" alt="close" />
        </button>
        <span class="thread-panel__title">Комментарии</span>
      </div>
      <div class="thread-panel" id="thread-panel">
        <div class="thread-panel__body" id="thread-body">
          <div id="thread-post"></div>
          <div class="thread-divider"></div>
          <div id="thread-comments"></div>
        </div>
      </div>
      <div class="thread-panel__compose">
        <img class="avatar" id="thread-compose-avatar" src="../../img/logo_blue.png" alt="" />
        <textarea class="compose__input thread-compose__input" id="thread-compose-input" rows="1" placeholder="Напишите ответ..."></textarea>
        <button class="btn-post thread-compose__btn" id="thread-btn-post">↑</button>
      </div>
    </div>
  </div>

  <!-- ══ Emoji panel ═════════════════════════ -->
  <div id="emoji-panel" class="emoji-panel">
    <div class="emoji-panel__grid" id="emoji-panel-grid"></div>
  </div>

  <!-- ══ Lightbox ════════════════════════════ -->
  <div id="lightbox" class="lightbox" style="display:none">
    <button class="lightbox__close" id="lightbox-close" title="Закрыть">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="lightbox__img" id="lightbox-img" src="" alt="" />
    <video class="lightbox__img" id="lightbox-video" src="" playsinline style="display:none"></video>

    <!-- toolbar для фото -->
    <div class="lightbox__toolbar" id="lb-toolbar-photo">
      <button class="lightbox__tool" id="lb-rotate-ccw"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg></button>
      <button class="lightbox__tool" id="lb-rotate-cw"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.95"/></svg></button>
      <div class="lightbox__toolbar-sep"></div>
      <button class="lightbox__tool" id="lb-flip-h"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 7l4 5-4 5M21 7l-4 5 4 5"/></svg></button>
      <button class="lightbox__tool" id="lb-flip-v"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M7 3l5 4 5-4M7 21l5-4 5 4"/></svg></button>
      <div class="lightbox__toolbar-sep"></div>
      <button class="lightbox__tool lightbox__tool--save" id="lb-save"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    </div>

    <!-- toolbar для видео -->
    <div class="lightbox__toolbar lightbox__toolbar--video" id="lb-toolbar-video" style="display:none">
      <button class="lightbox__tool" id="lb-play-btn">
        <svg class="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        <svg class="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <span class="lb-time" id="lb-time">0:00</span>
      <div class="lb-progress" id="lb-progress">
        <div class="lb-progress__bar" id="lb-bar"></div>
        <div class="lb-progress__thumb" id="lb-thumb"></div>
      </div>
      <span class="lb-time" id="lb-duration">0:00</span>
      <div class="lb-volume-wrap" id="lb-volume-wrap">
        <button class="lightbox__tool" id="lb-mute-btn">
          <svg class="icon-vol" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <svg class="icon-mute" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <div class="lb-volume-slider" id="lb-volume-slider">
          <div class="lb-volume-track" id="lb-volume-track">
            <div class="lb-volume-bar" id="lb-volume-bar"></div>
            <div class="lb-volume-thumb" id="lb-volume-thumb"></div>
          </div>
        </div>
      </div>
      <div class="lightbox__toolbar-sep"></div>
      <button class="lightbox__tool" id="lb-rotate-ccw-v"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg></button>
      <button class="lightbox__tool" id="lb-rotate-cw-v"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.95"/></svg></button>
      <div class="lightbox__toolbar-sep"></div>
      <button class="lightbox__tool" id="lb-flip-h-v"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 7l4 5-4 5M21 7l-4 5 4 5"/></svg></button>
      <button class="lightbox__tool" id="lb-flip-v-v"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M7 3l5 4 5-4M7 21l5-4 5 4"/></svg></button>
      <div class="lightbox__toolbar-sep"></div>
      <button class="lightbox__tool lightbox__tool--save" id="lb-save-video"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    </div>
  </div>

  <!-- ══ Shared ══════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" title="Главная">
      <img class="nav-icon" src="../../img/home.svg" alt="home" />
    </button>
    <button class="nav-btn" id="nav-profile" title="Профиль">
      <img class="nav-icon" src="../../img/profile.svg" alt="profile" />
    </button>
  </nav>

  <button class="btn-scroll-top" id="btn-scroll-top">
    <img src="../../img/up.svg" alt="up" />
  </button>

  <script src="../../node_modules/pako/dist/pako.min.js"></script>
  <script src="../../node_modules/lottie-web/build/player/lottie.min.js"></script>
  <script src="js/tgs.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/thread.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
